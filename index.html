<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tarot MVP</title>

  <style>
    body{
      margin:0;
      font-family: system-ui, -apple-system, Arial, sans-serif;
      background:#0e1116;
      color:#fff;
    }

    .wrap{
      max-width:900px;
      margin:auto;
      padding:20px;
    }

    h1{
      margin:0 0 10px;
    }

    textarea{
      width:100%;
      min-height:100px;
      padding:12px;
      font-size:16px;
      border-radius:12px;
      border:1px solid #333;
      background:#161a22;
      color:#fff;
    }

    button{
      margin-top:12px;
      padding:14px;
      width:100%;
      font-size:16px;
      border-radius:12px;
      border:1px solid #333;
      background:#1f2632;
      color:#fff;
      font-weight:bold;
      cursor:pointer;
    }

    .cards{
      margin-top:20px;
      display:grid;
      grid-template-columns: repeat(2, 1fr);
      gap:10px;
    }

    .card{
      min-height:90px;
      border-radius:14px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:10px;
      cursor:pointer;
      border:1px solid #333;
      transition:0.1s;
    }

    .card.face-down{
      background:linear-gradient(135deg,#1c2230,#141922);
    }

    .card.selected{
      background:#2a3243;
      font-weight:bold;
      border-color:#666;
    }

    .output{
      margin-top:20px;
      padding:15px;
      border-radius:12px;
      background:#141922;
      border:1px solid #333;
      white-space:pre-wrap;
      display:none;
    }

    @media (min-width:700px){
      .cards{
        grid-template-columns: repeat(4, 1fr);
      }
    }
  </style>
</head>

<body>
<div class="wrap">
  <h1>Tarot MVP</h1>

  <textarea id="question" placeholder="Digite sua pergunta..."></textarea>

  <button id="btnRead">Gerar leitura</button>

  <div class="cards" id="cards"></div>

  <div class="output" id="output"></div>
</div>

<script>
const DECK = [
"O Louco","O Mago","A Sacerdotisa","A Imperatriz","O Imperador",
"O Hierofante","Os Enamorados","O Carro","A Força","O Eremita",
"A Roda da Fortuna","A Justiça","O Enforcado","A Morte",
"A Temperança","O Diabo","A Torre","A Estrela","A Lua",
"O Sol","O Julgamento","O Mundo"
];

function shuffle(arr){
  return arr.sort(()=>Math.random()-0.5);
}

const SHUFFLED = shuffle([...DECK]);
const selected = new Set();

const elCards = document.getElementById("cards");
const elOutput = document.getElementById("output");
const btnRead = document.getElementById("btnRead");

function render(){
  elCards.innerHTML="";

  SHUFFLED.forEach(name=>{
    const div=document.createElement("div");

    const isSelected = selected.has(name);
    div.className="card "+(isSelected?"selected":"face-down");

    div.textContent = isSelected ? name : "Toque para virar";

    div.onclick=()=>{
      if(isSelected){
        selected.delete(name);
      } else {
        if(selected.size>=3) return;
        selected.add(name);
      }
      render();
    };

    elCards.appendChild(div);
  });
}

btnRead.onclick=async ()=>{
  const question=document.getElementById("question").value.trim();
  const cards=[...selected];

  if(!question) return alert("Digite uma pergunta.");
  if(cards.length!==3) return alert("Selecione 3 cartas.");

  btnRead.disabled=true;
  btnRead.textContent="Gerando...";

  try{
    const res=await fetch("/api/read",{
      method:"POST",
      headers:{ "Content-Type":"application/json"},
      body:JSON.stringify({question,cards})
    });

    const data=await res.json();

    elOutput.textContent=data.reading;
    elOutput.style.display="block";
  }catch(e){
    alert("Erro na API");
  }

  btnRead.disabled=false;
  btnRead.textContent="Gerar leitura";
};

render();
</script>
</body>
</html>
