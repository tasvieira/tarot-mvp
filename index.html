<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tarot IA (MVP)</title>
  <style>
    :root{
      --bg:#0b0f14;
      --card:#111826;
      --card2:#0f1724;
      --text:#e7edf5;
      --muted:#a7b3c2;
      --line:rgba(255,255,255,.10);
      --accent:#ffffff;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      background:linear-gradient(180deg, var(--bg), #06080c);
      color:var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    .wrap{
      max-width: 980px;
      margin: 0 auto;
      padding: 16px 12px 40px;
    }

    header{
      padding: 8px 0 12px;
    }

    h1{
      margin: 0 0 6px;
      font-size: 22px;
      letter-spacing: .2px;
    }

    .subtitle{
      margin:0;
      color:var(--muted);
      font-size: 14px;
      line-height: 1.3;
    }

    .panel{
      margin-top: 14px;
      background: rgba(255,255,255,.04);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      backdrop-filter: blur(8px);
    }

    label{
      display:block;
      font-weight: 600;
      margin: 4px 0 8px;
      font-size: 14px;
    }

    textarea{
      width: 100%;
      min-height: 110px;
      padding: 12px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(0,0,0,.25);
      color: var(--text);
      outline: none;
      font-size: 16px; /* evita zoom no iOS */
      line-height: 1.4;
      resize: vertical;
    }

    textarea::placeholder{ color: rgba(231,237,245,.55); }

    .row{
      display:flex;
      gap:10px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    button{
      border: 1px solid var(--line);
      background: rgba(255,255,255,.06);
      color: var(--text);
      padding: 14px 16px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      transition: transform .06s ease, background .12s ease;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    button:active{ transform: scale(.99); }
    button:hover{ background: rgba(255,255,255,.09); }
    button:disabled{
      opacity: .65;
      cursor: not-allowed;
    }

    .btn-secondary{
      font-weight: 600;
      background: rgba(255,255,255,.03);
    }

    .status{
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .pills{
      margin-top: 10px;
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,.07);
      border: 1px solid var(--line);
      font-size: 13px;
      color: var(--text);
    }
    .pill .x{
      cursor:pointer;
      opacity:.8;
      font-weight:900;
      padding:0 6px;
      border-radius:8px;
      border:1px solid transparent;
    }
    .pill .x:hover{ border-color: var(--line); }

    .cards{
      margin-top: 12px;
      display:grid;
      grid-template-columns: repeat(2, minmax(0, 1fr)); /* mobile-first */
      gap: 10px;
    }

    .card{
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px 12px;
      background: rgba(255,255,255,.04);
      min-height: 86px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      user-select:none;
      cursor:pointer;
      font-size: 14px;
      line-height: 1.2;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      transition: transform .06s ease, background .12s ease, border-color .12s ease;
    }

    .card:active{ transform: scale(.99); }
    .card.selected{
      background: rgba(255,255,255,.10);
      border-color: rgba(255,255,255,.35);
      font-weight: 800;
    }

    .output{
      margin-top: 14px;
      padding: 14px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: rgba(0,0,0,.22);
      white-space: pre-wrap;
      font-size: 16px;
      line-height: 1.5;
      display:none;
    }

    .hint{
      margin-top: 10px;
      font-size: 12px;
      color: rgba(231,237,245,.65);
      line-height: 1.35;
    }

    @media (min-width: 720px){
      .wrap{ padding: 22px 18px 60px; }
      h1{ font-size: 26px; }
      .panel{ padding: 18px; }
      .cards{ grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .row{ flex-wrap: nowrap; }
      button{ width: auto; min-width: 180px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Tarot IA (MVP)</h1>
      <p class="subtitle">Faça uma pergunta, selecione 3 cartas e receba uma leitura objetiva. Feito para funcionar bem no celular.</p>
    </header>

    <div class="panel">
      <label for="question">Sua pergunta</label>
      <textarea id="question" placeholder="Ex.: O que devo considerar sobre minha carreira nos próximos 3 meses?"></textarea>

      <div class="status" id="status">
        <span id="count">Selecionadas: 0/3</span>
        <span id="apiStatus"></span>
      </div>

      <div class="pills" id="selectedPills"></div>

      <div class="row">
        <button id="btnRead">Gerar leitura</button>
        <button id="btnClear" class="btn-secondary" type="button">Limpar</button>
      </div>

      <div class="hint">
        Dica: você pode tocar novamente em uma carta selecionada para desmarcar. O MVP limita em 3 cartas.
      </div>
    </div>

    <div class="panel">
      <label>Selecione 3 cartas</label>
      <div class="cards" id="cards"></div>
      <div class="output" id="output"></div>
    </div>
  </div>

<script>
  // 22 Arcanos Maiores (MVP enxuto)
  const DECK = [
    "O Louco","O Mago","A Sacerdotisa","A Imperatriz","O Imperador","O Hierofante",
    "Os Enamorados","O Carro","A Força","O Eremita","A Roda da Fortuna","A Justiça",
    "O Enforcado","A Morte","A Temperança","O Diabo","A Torre","A Estrela","A Lua",
    "O Sol","O Julgamento","O Mundo"
  ];

  const selected = new Set();

  const elCards = document.getElementById("cards");
  const elCount = document.getElementById("count");
  const elApiStatus = document.getElementById("apiStatus");
  const elOutput = document.getElementById("output");
  const elPills = document.getElementById("selectedPills");

  const btnRead = document.getElementById("btnRead");
  const btnClear = document.getElementById("btnClear");

  // Mesma origem (Vercel): front e API no mesmo projeto
  const API_URL = "/api/read";

  function shuffle(arr){
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // Baralho embaralhado a cada refresh
  const SHUFFLED = shuffle(DECK);

  function render() {
    elCards.innerHTML = "";

    SHUFFLED.forEach((name) => {
      const div = document.createElement("div");
      div.className = "card" + (selected.has(name) ? " selected" : "");
      div.textContent = name;
      div.onclick = () => toggle(name);
      elCards.appendChild(div);
    });

    const arr = Array.from(selected);
    elCount.textContent = `Selecionadas: ${arr.length}/3`;

    elPills.innerHTML = arr.map(c => `
      <span class="pill">
        ${escapeHtml(c)}
        <span class="x" title="Remover" data-card="${escapeHtml(c)}">×</span>
      </span>
    `).join("");

    // Remove via "x" no pill
    elPills.querySelectorAll(".x").forEach(x => {
      x.addEventListener("click", (e) => {
        const card = e.currentTarget.getAttribute("data-card");
        selected.delete(card);
        render();
      });
    });
  }

  function toggle(name) {
    if (selected.has(name)) selected.delete(name);
    else {
      if (selected.size >= 3) return;
      selected.add(name);
    }
    render();
  }

  function clearAll(){
    selected.clear();
    elApiStatus.textContent = "";
    elOutput.style.display = "none";
    elOutput.textContent = "";
    render();
  }

  function lockUI(locked){
    btnRead.disabled = locked;
    btnClear.disabled = locked;
    if (locked) {
      btnRead.textContent = "Gerando...";
    } else {
      btnRead.textContent = "Gerar leitura";
    }
  }

  async function gerarLeitura() {
    elOutput.style.display = "none";
    elOutput.textContent = "";

    const question = document.getElementById("question").value.trim();
    const cards = Array.from(selected);

    if (!question) {
      alert("Digite uma pergunta.");
      return;
    }
    if (cards.length !== 3) {
      alert("Selecione exatamente 3 cartas.");
      return;
    }

    lockUI(true);
    elApiStatus.textContent = "Chamando a IA...";

    try {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question, cards })
      });

      if (!res.ok) {
        const msg = await res.text();
        throw new Error(msg || "Erro na API");
      }

      const data = await res.json();
      elOutput.textContent = (data.reading || "Sem resposta.").trim();
      elOutput.style.display = "block";
      elApiStatus.textContent = "Pronto.";
      // Scroll suave para o resultado no mobile
      elOutput.scrollIntoView({ behavior: "smooth", block: "start" });
    } catch (e) {
      elApiStatus.textContent = "Falhou.";
      alert("Erro: " + e.message);
    } finally {
      lockUI(false);
    }
  }

  function escapeHtml(str){
    return String(str)
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

  btnRead.addEventListener("click", gerarLeitura);
  btnClear.addEventListener("click", clearAll);

  render();
</script>
</body>
</html>
